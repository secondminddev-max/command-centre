<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1520"/>
      <stop offset="100%" stop-color="#060b12"/>
    </linearGradient>
    <linearGradient id="brainL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="60%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="brainR" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="40%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="synapse" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="innerglow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <circle cx="256" cy="256" r="248" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="246" fill="none" stroke="#1a2a42" stroke-width="2"/>
  <circle cx="256" cy="256" r="238" fill="none" stroke="#0f1d2f" stroke-width="1" stroke-dasharray="4,8" opacity="0.5"/>

  <!-- Ambient neural network — outer ring synapses -->
  <g opacity="0.25" filter="url(#softglow)">
    <!-- Outer ring nodes -->
    <circle cx="160" cy="110" r="3" fill="#c084fc"/>
    <circle cx="352" cy="110" r="3" fill="#00d4ff"/>
    <circle cx="110" cy="200" r="2.5" fill="#7c3aed"/>
    <circle cx="402" cy="200" r="2.5" fill="#0ea5e9"/>
    <circle cx="100" cy="300" r="2.5" fill="#c084fc"/>
    <circle cx="412" cy="300" r="2.5" fill="#00d4ff"/>
    <circle cx="150" cy="380" r="3" fill="#7c3aed"/>
    <circle cx="362" cy="380" r="3" fill="#0ea5e9"/>
    <!-- Connections to brain -->
    <line x1="160" y1="110" x2="220" y2="170" stroke="#c084fc" stroke-width="1" opacity="0.6"/>
    <line x1="352" y1="110" x2="292" y2="170" stroke="#00d4ff" stroke-width="1" opacity="0.6"/>
    <line x1="110" y1="200" x2="190" y2="220" stroke="#7c3aed" stroke-width="1" opacity="0.4"/>
    <line x1="402" y1="200" x2="322" y2="220" stroke="#0ea5e9" stroke-width="1" opacity="0.4"/>
    <line x1="100" y1="300" x2="185" y2="275" stroke="#c084fc" stroke-width="1" opacity="0.4"/>
    <line x1="412" y1="300" x2="327" y2="275" stroke="#00d4ff" stroke-width="1" opacity="0.4"/>
    <line x1="150" y1="380" x2="220" y2="320" stroke="#7c3aed" stroke-width="1" opacity="0.5"/>
    <line x1="362" y1="380" x2="292" y2="320" stroke="#0ea5e9" stroke-width="1" opacity="0.5"/>
    <!-- Cross connections -->
    <line x1="160" y1="110" x2="352" y2="110" stroke="#c084fc" stroke-width="0.5" opacity="0.15" stroke-dasharray="6,6"/>
    <line x1="110" y1="200" x2="402" y2="200" stroke="#00d4ff" stroke-width="0.5" opacity="0.15" stroke-dasharray="6,6"/>
    <line x1="100" y1="300" x2="412" y2="300" stroke="#c084fc" stroke-width="0.5" opacity="0.15" stroke-dasharray="6,6"/>
  </g>

  <!-- Inner neural layer -->
  <g opacity="0.45" filter="url(#glow)">
    <line x1="190" y1="170" x2="256" y2="185" stroke="#c084fc" stroke-width="1.5"/>
    <line x1="322" y1="170" x2="256" y2="185" stroke="#00d4ff" stroke-width="1.5"/>
    <line x1="190" y1="170" x2="175" y2="240" stroke="#7c3aed" stroke-width="1.2"/>
    <line x1="322" y1="170" x2="337" y2="240" stroke="#0ea5e9" stroke-width="1.2"/>
    <line x1="175" y1="240" x2="200" y2="305" stroke="#c084fc" stroke-width="1.2"/>
    <line x1="337" y1="240" x2="312" y2="305" stroke="#00d4ff" stroke-width="1.2"/>
    <line x1="200" y1="305" x2="256" y2="330" stroke="#7c3aed" stroke-width="1.5"/>
    <line x1="312" y1="305" x2="256" y2="330" stroke="#0ea5e9" stroke-width="1.5"/>
    <!-- Inner nodes -->
    <circle cx="190" cy="170" r="5" fill="#c084fc"/>
    <circle cx="322" cy="170" r="5" fill="#00d4ff"/>
    <circle cx="175" cy="240" r="4" fill="#7c3aed"/>
    <circle cx="337" cy="240" r="4" fill="#0ea5e9"/>
    <circle cx="200" cy="305" r="4" fill="#c084fc"/>
    <circle cx="312" cy="305" r="4" fill="#00d4ff"/>
  </g>

  <!-- Central brain -->
  <g transform="translate(256,240)" filter="url(#glow)">
    <!-- Left hemisphere -->
    <path d="M-6,-55 C-15,-58 -35,-55 -50,-42 C-65,-28 -70,-8 -68,12 C-66,28 -58,42 -44,52 C-36,58 -28,65 -22,70 C-16,74 -8,72 -4,68 L-4,-55 Z"
          fill="url(#brainL)" opacity="0.92"/>
    <!-- Right hemisphere -->
    <path d="M6,-55 C15,-58 35,-55 50,-42 C65,-28 70,-8 68,12 C66,28 58,42 44,52 C36,58 28,65 22,70 C16,74 8,72 4,68 L4,-55 Z"
          fill="url(#brainR)" opacity="0.92"/>

    <!-- Brain sulci — left -->
    <path d="M-58,-20 C-45,-26 -32,-12 -18,-18" fill="none" stroke="#0d1520" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
    <path d="M-62,2 C-48,-4 -36,10 -14,4" fill="none" stroke="#0d1520" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
    <path d="M-60,22 C-46,16 -34,28 -16,22" fill="none" stroke="#0d1520" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <path d="M-52,40 C-40,34 -30,44 -18,38" fill="none" stroke="#0d1520" stroke-width="1.8" stroke-linecap="round" opacity="0.5"/>

    <!-- Brain sulci — right -->
    <path d="M58,-20 C45,-26 32,-12 18,-18" fill="none" stroke="#0d1520" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
    <path d="M62,2 C48,-4 36,10 14,4" fill="none" stroke="#0d1520" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
    <path d="M60,22 C46,16 34,28 16,22" fill="none" stroke="#0d1520" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <path d="M52,40 C40,34 30,44 18,38" fill="none" stroke="#0d1520" stroke-width="1.8" stroke-linecap="round" opacity="0.5"/>

    <!-- Central fissure -->
    <line x1="0" y1="-55" x2="0" y2="68" stroke="#0d1520" stroke-width="2.5" opacity="0.8"/>

    <!-- Neural sparkle nodes on brain surface -->
    <circle cx="-30" cy="-30" r="2.5" fill="#fff" opacity="0.5"/>
    <circle cx="35" cy="-25" r="2" fill="#fff" opacity="0.4"/>
    <circle cx="-40" cy="15" r="2" fill="#fff" opacity="0.35"/>
    <circle cx="42" cy="10" r="2.5" fill="#fff" opacity="0.45"/>
    <circle cx="-20" cy="45" r="1.8" fill="#fff" opacity="0.3"/>
    <circle cx="25" cy="48" r="1.8" fill="#fff" opacity="0.3"/>
  </g>

  <!-- Terminal cursor — integrated at brain base -->
  <g filter="url(#innerglow)">
    <rect x="236" y="316" width="40" height="5" rx="2.5" fill="#00d4ff" opacity="0.9">
      <animate attributeName="opacity" values="0.9;0.15;0.9" dur="1.2s" repeatCount="indefinite"/>
    </rect>
    <!-- Terminal prompt chevron -->
    <path d="M224,318.5 L232,321.5 L224,324.5" fill="none" stroke="#c084fc" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.7">
      <animate attributeName="opacity" values="0.7;0.3;0.7" dur="1.2s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Data pulse — traveling dot along synapse -->
  <circle r="3" fill="#00d4ff" opacity="0.7">
    <animateMotion dur="3s" repeatCount="indefinite" path="M190,170 L256,185 L322,170"/>
    <animate attributeName="opacity" values="0;0.7;0.7;0" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle r="3" fill="#c084fc" opacity="0.7">
    <animateMotion dur="3.5s" repeatCount="indefinite" path="M200,305 L256,330 L312,305"/>
    <animate attributeName="opacity" values="0;0.7;0.7;0" dur="3.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Product name -->
  <text x="256" y="400" text-anchor="middle" fill="#e8f4ff" font-family="'SF Pro Display',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="32" font-weight="800" letter-spacing="6">HQ</text>
  <text x="256" y="424" text-anchor="middle" fill="#4a6a8a" font-family="'SF Pro Display',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" font-weight="500" letter-spacing="8">COMMAND CENTRE</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120" width="100" height="120">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d8b4fe"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="gl"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <style>
    @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
    @keyframes blink{0%,40%,44%,100%{ry:6}42%{ry:0.8}}
    @keyframes shadow{0%,100%{rx:22;opacity:0.15}50%{rx:18;opacity:0.1}}
    .b{animation:bob 2s ease-in-out infinite}
    .el{animation:blink 3.5s ease-in-out infinite}
    .er{animation:blink 3.5s ease-in-out infinite 0.1s}
    .sh{animation:shadow 2s ease-in-out infinite}
  </style>
  <ellipse class="sh" cx="50" cy="112" rx="22" ry="5" fill="rgba(0,0,0,0.15)"/>
  <g class="b" filter="url(#gl)">
    <path d="M22,55 Q22,12 50,10 Q78,12 78,55 L78,88 Q74,78 69,88 Q64,78 59,88 Q54,78 50,88 Q46,78 41,88 Q36,78 31,88 Q26,78 22,88 Z" fill="url(#g)" opacity="0.93"/>
    <path d="M35,22 Q45,15 62,20" fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="2.5" stroke-linecap="round"/>
    <ellipse class="el" cx="40" cy="42" rx="6" ry="6" fill="#fff"/>
    <ellipse class="er" cx="62" cy="42" rx="6" ry="6" fill="#fff"/>
    <ellipse cx="42" cy="43" rx="3" ry="3.2" fill="#1e1b4b"/>
    <ellipse cx="64" cy="43" rx="3" ry="3.2" fill="#1e1b4b"/>
    <circle cx="38.5" cy="40" r="1.8" fill="rgba(255,255,255,0.85)"/>
    <circle cx="60.5" cy="40" r="1.8" fill="rgba(255,255,255,0.85)"/>
    <path d="M43,55 Q50,63 57,55" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" opacity="0.7"/>
    <ellipse cx="32" cy="52" rx="5" ry="3.5" fill="rgba(251,113,133,0.22)"/>
    <ellipse cx="68" cy="52" rx="5" ry="3.5" fill="rgba(251,113,133,0.22)"/>
  </g>
</svg>

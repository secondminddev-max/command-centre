<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 130" width="100" height="130">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d8b4fe"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="visor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <filter id="gl"><feGaussianBlur stdDeviation="1.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <style>
    @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
    @keyframes visorGlow{0%,100%{opacity:0.85}50%{opacity:1}}
    @keyframes legWalk{0%,100%{transform:translateY(0)}25%{transform:translateY(-2px)}75%{transform:translateY(2px)}}
    .body{animation:bob 2.2s ease-in-out infinite}
    .vg{animation:visorGlow 3s ease-in-out infinite}
    .ll{animation:legWalk 1.5s ease-in-out infinite}
    .lr{animation:legWalk 1.5s ease-in-out infinite 0.75s}
  </style>
  <!-- Shadow -->
  <ellipse cx="50" cy="120" rx="20" ry="4" fill="rgba(0,0,0,0.12)">
    <animate attributeName="rx" values="20;16;20" dur="2.2s" repeatCount="indefinite"/>
  </ellipse>
  <g class="body" filter="url(#gl)">
    <!-- Backpack / life support (behind body) -->
    <rect x="60" y="30" width="16" height="40" rx="6" fill="#6d28d9" opacity="0.85"/>
    <rect x="63" y="34" width="10" height="8" rx="2" fill="#4c1d95" opacity="0.6"/>
    <rect x="63" y="46" width="10" height="8" rx="2" fill="#4c1d95" opacity="0.6"/>
    <circle cx="68" cy="62" r="3" fill="#a78bfa" opacity="0.5"/>
    <!-- Main body — rounded bean/capsule shape -->
    <path d="M25,45 Q25,10 50,8 Q75,10 75,45 L75,80 Q75,100 50,100 Q25,100 25,80 Z" fill="url(#bg)" opacity="0.95"/>
    <!-- Body highlight -->
    <path d="M35,18 Q48,10 62,16" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Belly line (suit detail) -->
    <path d="M38,65 Q50,72 62,65" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>
    <!-- Visor / face shield — rounded rectangle -->
    <rect x="32" y="28" width="30" height="28" rx="12" fill="url(#visor)" class="vg"/>
    <!-- Visor reflection -->
    <path d="M36,32 Q40,30 48,32" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Eyes inside visor -->
    <ellipse cx="42" cy="42" rx="4" ry="4.5" fill="#fff" opacity="0.95"/>
    <ellipse cx="55" cy="42" rx="4" ry="4.5" fill="#fff" opacity="0.95"/>
    <ellipse cx="43.5" cy="43" rx="2.2" ry="2.5" fill="#0f172a"/>
    <ellipse cx="56.5" cy="43" rx="2.2" ry="2.5" fill="#0f172a"/>
    <!-- Eye sparkle -->
    <circle cx="41" cy="40.5" r="1.3" fill="rgba(255,255,255,0.9)"/>
    <circle cx="54" cy="40.5" r="1.3" fill="rgba(255,255,255,0.9)"/>
    <!-- Legs (short, stubby) -->
    <g class="ll">
      <rect x="33" y="96" width="12" height="14" rx="5" fill="#6d28d9"/>
      <!-- Boot -->
      <rect x="31" y="106" width="16" height="6" rx="3" fill="#5b21b6"/>
    </g>
    <g class="lr">
      <rect x="55" y="96" width="12" height="14" rx="5" fill="#6d28d9"/>
      <!-- Boot -->
      <rect x="53" y="106" width="16" height="6" rx="3" fill="#5b21b6"/>
    </g>
  </g>
</svg>

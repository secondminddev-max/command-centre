<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Command Centre — Launch Sprint Dashboard</title>
<style>
  :root { --bg: #0a0e17; --surface: #111827; --border: #1e293b; --text: #e2e8f0; --muted: #94a3b8; --accent: #6366f1; --green: #22c55e; --yellow: #f59e0b; --red: #ef4444; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 24px; }
  h1 { font-size: 2rem; margin-bottom: 8px; }
  .subtitle { color: var(--muted); margin-bottom: 32px; }
  .countdown { background: var(--surface); border: 1px solid var(--accent); border-radius: 12px; padding: 24px; text-align: center; margin-bottom: 32px; }
  .countdown .days { font-size: 3rem; font-weight: 800; color: var(--accent); }
  .countdown .label { color: var(--muted); }
  .overall-bar { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin-bottom: 32px; }
  .overall-bar h3 { margin-bottom: 8px; }
  .progress-track { background: #1e293b; border-radius: 6px; height: 24px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 6px; background: linear-gradient(90deg, var(--accent), var(--green)); transition: width 0.5s; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: 700; }
  .streams { display: grid; gap: 20px; }
  .stream-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; }
  .stream-card h3 { font-size: 1.2rem; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .stream-card .progress-track { height: 12px; margin-bottom: 16px; }
  .stream-card .progress-fill { font-size: 0; }
  .task-list { list-style: none; }
  .task-list li { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
  .task-list li:last-child { border-bottom: none; }
  .status { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 0.75rem; font-weight: 600; flex-shrink: 0; }
  .status.done { background: rgba(34,197,94,0.15); color: var(--green); }
  .status.in_progress { background: rgba(245,158,11,0.15); color: var(--yellow); }
  .status.pending { background: rgba(148,163,184,0.1); color: var(--muted); }
  .assignee { color: var(--muted); font-size: 0.8rem; margin-left: auto; }
  .deadline-tag { color: var(--muted); font-size: 0.75rem; }
  .refresh-btn { position: fixed; bottom: 24px; right: 24px; background: var(--accent); color: #fff; border: none; border-radius: 8px; padding: 12px 20px; cursor: pointer; font-weight: 600; }
  .error-msg { color: var(--red); text-align: center; padding: 40px; }
  #loading { text-align: center; padding: 60px; color: var(--muted); }
</style>
</head>
<body>

<h1>Command Centre Launch Sprint</h1>
<p class="subtitle">7 deliverable streams — Deadline: March 25, 2026</p>

<div class="countdown">
  <div class="days" id="countdown-days">—</div>
  <div class="label">days remaining</div>
</div>

<div class="overall-bar">
  <h3>Overall Progress: <span id="overall-pct">—</span></h3>
  <div class="progress-track"><div class="progress-fill" id="overall-fill" style="width: 0%"></div></div>
</div>

<div class="streams" id="streams-container">
  <div id="loading">Loading tracker data...</div>
</div>

<button class="refresh-btn" onclick="loadData()">Refresh</button>

<script>
const TRACKER_URL = '/data/product_launch_tracker.json';
const DEADLINE = new Date('2026-03-25T23:59:59');

function updateCountdown() {
  const now = new Date();
  const diff = DEADLINE - now;
  const days = Math.max(0, Math.ceil(diff / (1000 * 60 * 60 * 24)));
  document.getElementById('countdown-days').textContent = days;
}

function statusBadge(status) {
  const labels = { done: 'Done', in_progress: 'In Progress', pending: 'Pending' };
  return `<span class="status ${status}">${labels[status] || status}</span>`;
}

function renderStreams(data) {
  const container = document.getElementById('streams-container');
  const streams = data.streams;
  let totalTasks = 0, totalDone = 0;
  let html = '';

  for (const [key, stream] of Object.entries(streams)) {
    const tasks = stream.tasks || [];
    const done = tasks.filter(t => t.status === 'done').length;
    const inProg = tasks.filter(t => t.status === 'in_progress').length;
    const pct = tasks.length ? Math.round((done / tasks.length) * 100) : 0;
    totalTasks += tasks.length;
    totalDone += done;

    let taskHtml = '';
    for (const t of tasks) {
      taskHtml += `<li>
        ${statusBadge(t.status)}
        <span>${t.title}</span>
        <span class="assignee">@${t.assignee}</span>
        <span class="deadline-tag">${t.deadline}</span>
      </li>`;
    }

    html += `<div class="stream-card">
      <h3>${stream.label} <span style="color:var(--muted);font-size:0.85rem;font-weight:400">${done}/${tasks.length} done</span></h3>
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
      <ul class="task-list">${taskHtml}</ul>
    </div>`;
  }

  container.innerHTML = html;

  const overallPct = totalTasks ? Math.round((totalDone / totalTasks) * 100) : 0;
  document.getElementById('overall-pct').textContent = overallPct + '%';
  document.getElementById('overall-fill').style.width = overallPct + '%';
  document.getElementById('overall-fill').textContent = overallPct + '%';
}

async function loadData() {
  try {
    const res = await fetch(TRACKER_URL + '?t=' + Date.now());
    if (!res.ok) throw new Error('Failed to load tracker');
    const data = await res.json();
    renderStreams(data);
  } catch (e) {
    document.getElementById('streams-container').innerHTML =
      `<div class="error-msg">Could not load tracker data.<br>${e.message}<br>Ensure data/product_launch_tracker.json is served.</div>`;
  }
}

updateCountdown();
setInterval(updateCountdown, 60000);
loadData();
</script>
</body>
</html>

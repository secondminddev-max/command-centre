services:
  - type: web
    name: command-centre
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python agent_server.py
    envVars:
      - key: PORT
        value: "10000"
      - key: RENDER
        value: "true"
      - key: PYTHON_VERSION
        value: "3.12.0"
    healthCheckPath: /api/health
    plan: free
    customDomains:
      - name: secondmindhq.com
      - name: www.secondmindhq.com
      - name: secondmindlabs.com
      - name: www.secondmindlabs.com
